<!DOCTYPE html>
<html>

<head>
    <title>Prediction Result</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-5 text-center">

<h2 class="mb-4">Insurance Fraud Detection Result</h2>

{% if prediction_text == "Fraudulent Insurance Claim" %}

<div class="alert alert-danger fs-4">
⚠️ <strong>{{ prediction_text }}</strong>
</div>

{% else %}

<div class="alert alert-success fs-4">
✅ <strong>{{ prediction_text }}</strong>
</div>

{% endif %}

<a href="/" class="btn btn-primary mt-3">
Check Another Claim
</a>

</div>

</div>

</body>

</html>
