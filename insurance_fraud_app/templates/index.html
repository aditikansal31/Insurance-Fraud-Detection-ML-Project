<!DOCTYPE html>
<html>
<head>

<title>Insurance Fraud Detection</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center mb-4">Insurance Fraud Detection</h2>

<form action="/predict" method="post">

<div class="row">

<div class="col-md-6 mb-3">
<label>Months as Customer</label>
<input type="number" name="months_as_customer" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Age</label>
<input type="number" name="age" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Policy Number</label>
<input type="number" name="policy_number" class="form-control">
</div>

<label>Policy State</label>
<select name="policy_state" class="form-control">
<option value="OH">OH</option>
<option value="IN">IN</option>
<option value="IL">IL</option>
</select>

<label>Policy CSL</label>
<select name="policy_csl" class="form-control">
<option value="250/500">250/500</option>
<option value="100/300">100/300</option>
<option value="500/1000">500/1000</option>
</select>

<div class="col-md-6 mb-3">
<label>Policy Deductable</label>
<input type="number" name="policy_deductable" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Policy Annual Premium</label>
<input type="number" name="policy_annual_premium" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Umbrella Limit</label>
<input type="number" name="umbrella_limit" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Insured ZIP</label>
<input type="number" name="insured_zip" class="form-control">
</div>

<label>Education Level</label>
<select name="insured_education_level" class="form-control">
<option value="High School">High School</option>
<option value="Associate">Associate</option>
<option value="Bachelor">Bachelor</option>
<option value="Master">Master</option>
<option value="PhD">PhD</option>
</select>

<div class="col-md-6 mb-3">
<label>Occupation</label>
<input type="number" name="insured_occupation" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Hobbies</label>
<input type="number" name="insured_hobbies" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Relationship</label>
<input type="number" name="insured_relationship" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Capital Gains</label>
<input type="number" name="capital-gains" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Capital Loss</label>
<input type="number" name="capital-loss" class="form-control">
</div>

<label>Incident Type</label>
<select name="incident_type" class="form-control">
<option value="Single Vehicle Collision">Single Vehicle Collision</option>
<option value="Vehicle Theft">Vehicle Theft</option>
<option value="Multi-vehicle Collision">Multi-vehicle Collision</option>
<option value="Parked Car">Parked Car</option>
</select>

<label>Collision Type</label>
<select name="collision_type" class="form-control">
<option value="Rear Collision">Rear Collision</option>
<option value="Side Collision">Side Collision</option>
<option value="Front Collision">Front Collision</option>
</select>

<label>Incident Severity</label>
<select name="incident_severity" class="form-control">
<option value="Minor Damage">Minor Damage</option>
<option value="Major Damage">Major Damage</option>
<option value="Total Loss">Total Loss</option>
<option value="Trivial Damage">Trivial Damage</option>
</select>

<div class="col-md-6 mb-3">
<label>Authorities Contacted</label>
<input type="number" name="authorities_contacted" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Incident State</label>
<input type="number" name="incident_state" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Incident City</label>
<input type="number" name="incident_city" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Incident Location</label>
<input type="number" name="incident_location" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Incident Hour</label>
<input type="number" name="incident_hour_of_the_day" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Vehicles Involved</label>
<input type="number" name="number_of_vehicles_involved" class="form-control">
</div>

<label>Property Damage</label>
<select name="property_damage" class="form-control">
<option value="YES">Yes</option>
<option value="NO">No</option>
</select>

<div class="col-md-6 mb-3">
<label>Bodily Injuries</label>
<input type="number" name="bodily_injuries" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Witnesses</label>
<input type="number" name="witnesses" class="form-control">
</div>

<label>Police Report Available</label>
<select name="police_report_available" class="form-control">
<option value="YES">Yes</option>
<option value="NO">No</option>
</select>

<label>Insured Sex</label>
<select name="insured_sex">
<option value="0">Male</option>
<option value="1">Female</option>
</select>

<div class="col-md-6 mb-3">
<label>Total Claim Amount</label>
<input type="number" name="total_claim_amount" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Auto Make</label>
<input type="number" name="auto_make" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Auto Model</label>
<input type="number" name="auto_model" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Auto Year</label>
<input type="number" name="auto_year" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Policy Annual Premium Log</label>
<input type="number" step="any" name="policy_annual_premium_log" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Claim Delay</label>
<input type="number" name="claim_delay" class="form-control">
</div>

</div>

<div class="text-center mt-3">
<button class="btn btn-primary">Predict Fraud</button>
</div>

</form>

</div>

</div>

</body>
</html>
